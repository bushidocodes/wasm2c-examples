name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install LLVM (with wasm32 target)
        env:
          # SHA-256 of https://apt.llvm.org/llvm.sh, pinned to detect tampering
          # or a compromised upstream. Update this when apt.llvm.org/llvm.sh changes (re-download, sha256sum, verify out-of-band before committing).
          LLVM_SH_SHA256: 9474ecd78b52aba6e923976b1e9773f5613027cc7e237b9956986cb536e02a36
        run: |
          wget https://apt.llvm.org/llvm.sh
          echo "${LLVM_SH_SHA256}  llvm.sh" | sha256sum --check --strict
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y lld-18

      - name: Download wabt
        run: |
          mkdir -p tools
          curl -L https://github.com/WebAssembly/wabt/releases/download/1.0.41/wabt-1.0.41-linux-x64.tar.gz \
            | tar -xz -C tools/

      - name: Test add-sub-c
        run: |
          cd add-sub-c
          make test WASM_CLANG=clang-18 CC=clang-18 WABT_DIR=../tools/wabt-1.0.41

      - name: Test add-sub-wat
        run: |
          cd add-sub-wat
          make test CC=clang-18 WABT_DIR=../tools/wabt-1.0.41
